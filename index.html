<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Commute Analysis</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Morning Commute Analysis</h1>
        </header>

        <main>
            <!-- File Upload Section -->
            <section class="upload-section">
                <h2>Upload GTFS Data</h2>
                <div class="form-group">
                    <label for="gtfs-file">Select GTFS ZIP File:</label>
                    <input 
                        type="file" 
                        id="gtfs-file" 
                        accept=".zip" 
                        required
                    >
                </div>
                <div id="upload-status" class="status-message"></div>
            </section>

            <!-- Route Selection Section -->
            <section class="route-section" id="route-section" style="display: none;">
                <h2>Select Route</h2>
                <div class="form-group">
                    <label for="route-select">Route:</label>
                    <select id="route-select">
                        <option value="">-- Choose a route --</option>
                    </select>
                </div>
            </section>

            <!-- Stops Configuration Section -->
            <section class="stops-section" id="stops-section" style="display: none;">
                <h2>Configure Stops</h2>
                <div id="stops-container" class="stops-container"></div>
            </section>

            <!-- Analyze Button -->
            <section class="analyze-section" id="analyze-section" style="display: none;">
                <button id="analyze-btn" class="btn-primary">Analyze</button>
            </section>

            <!-- Results Section -->
            <section class="results-section" id="results-section" style="display: none;">
                <h2>Headway Analysis</h2>
                <div class="chart-container">
                    <canvas id="headway-chart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
